name: Daily Discord Digest

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. Running at both 15:05 and 16:05 UTC lets the
    # Python script honor 10:00 America/Chicago across daylight saving time.
    - cron: "5 15,16 * * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate digest and send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          TZ_NAME: America/Chicago
          RUN_WINDOW_HOUR: "10"
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python src/daily_digest.py

      - name: Commit generated archive
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "daily-digest-bot@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Add daily digest archive"
            git push
          fi
